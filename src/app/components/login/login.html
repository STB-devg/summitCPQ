<div class="login-wrap">
  <div class="login-card">
    <div class="logo" aria-hidden="true">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="#4493f8">
        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z"/>
      </svg>
    </div>

    <h1>SummitCPQ</h1>
    <p class="subtitle">Sign in to your account</p>

    @if (error()) {
      <div class="error" role="alert">{{ error() }}</div>
    }

    <form [formGroup]="form" (ngSubmit)="login()">
      <div class="field">
        <label for="email">Email</label>
        <input
          id="email"
          type="email"
          formControlName="email"
          placeholder="you@summitbodies.com"
          autocomplete="email"
          [attr.aria-invalid]="form.controls.email.invalid && form.controls.email.touched"
        />
        @if (form.controls.email.invalid && form.controls.email.touched) {
          <span class="field-error" role="alert">Valid email is required</span>
        }
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input
          id="password"
          type="password"
          formControlName="password"
          placeholder="••••••••"
          autocomplete="current-password"
          [attr.aria-invalid]="form.controls.password.invalid && form.controls.password.touched"
        />
        @if (form.controls.password.invalid && form.controls.password.touched) {
          <span class="field-error" role="alert">Password must be at least 6 characters</span>
        }
      </div>

      <button type="submit" [disabled]="loading() || form.invalid">
        {{ loading() ? 'Signing in...' : 'Sign in' }}
      </button>
    </form>
  </div>
</div>
